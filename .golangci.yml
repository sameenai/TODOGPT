version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Println
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      # Allow unused parameters in HTTP handlers (required by interface)
      - linters:
          - revive
        text: "unused-parameter"
      # Allow unchecked errors in test files
      - path: _test\.go
        linters:
          - errcheck
