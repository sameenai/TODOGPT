version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Println
        - (*net/http.bodyEOFSignal).Close
        - (io.Closer).Close
        - (*github.com/gorilla/websocket.Conn).Close
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).SetWriteDeadline
        - (*github.com/gorilla/websocket.Conn).WriteMessage
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      # Allow unused parameters in HTTP handlers (required by interface)
      - linters:
          - revive
        text: "unused-parameter"
      # Allow unchecked errors in test files
      - path: _test\.go
        linters:
          - errcheck
      # Allow unchecked errors for json.NewEncoder().Encode in handlers
      - linters:
          - errcheck
        text: "Error return value of .*(Encode|Close)"
